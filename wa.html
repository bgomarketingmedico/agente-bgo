<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aguarde...</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f7f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center}

.modal-wrap{width:100%;max-width:440px;margin:16px;animation:up .3s cubic-bezier(.22,1,.36,1)}
@keyframes up{from{transform:translateY(30px);opacity:0}to{transform:none;opacity:1}}

.modal{background:white;border-radius:20px;overflow:hidden;box-shadow:0 8px 40px rgba(45,10,52,.15)}

.modal-header{padding:20px 20px 16px;display:flex;align-items:flex-start;gap:12px}
.modal-header svg{width:28px;height:28px;fill:white;flex-shrink:0;margin-top:2px}
.modal-header h2{color:white;font-size:1.05rem;font-weight:700;margin:0 0 3px}
.modal-header p{color:rgba(255,255,255,.82);font-size:.82rem;margin:0}
.modal-header .close-btn{margin-left:auto;background:rgba(0,0,0,.15);border:none;cursor:pointer;color:white;font-size:1rem;padding:6px 8px;border-radius:50%;flex-shrink:0;line-height:1}

.modal-body{padding:20px}

.field{margin-bottom:14px}
.field label{display:block;font-size:.76rem;font-weight:700;color:#444;margin-bottom:5px}
.field label .req{color:#e74c3c}
.field input,.field select{width:100%;border:1.5px solid #ddd;border-radius:9px;padding:10px 12px;font-size:.88rem;font-family:inherit;outline:none;color:#111;background:#fafafa;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:#25D366;box-shadow:0 0 0 3px rgba(37,211,102,.1);background:#fff}

.btn-wa{width:100%;padding:13px;color:white;border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;margin-top:6px;transition:opacity .2s}
.btn-wa:hover{opacity:.9}
.btn-wa:disabled{opacity:.6;cursor:default}
.btn-wa svg{width:17px;height:17px;fill:white}

.err-msg{color:#c0392b;font-size:.77rem;margin-top:8px;display:none}

.success{display:none;text-align:center;padding:28px 0 16px}
.success svg{width:52px;height:52px;margin-bottom:10px}
.success h3{color:#222;font-size:1rem;margin:0 0 6px}
.success p{color:#777;font-size:.85rem}

.lgpd{font-size:.7rem;color:#aaa;text-align:center;margin-top:12px;line-height:1.4}

/* Loading inicial */
.loading-screen{position:fixed;inset:0;background:#f7f5f9;display:flex;align-items:center;justify-content:center;z-index:10}
.loading-screen.hide{display:none}
.spinner{width:36px;height:36px;border:3px solid #E2D9E8;border-top-color:#2D0A34;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Powered by */
.powered{text-align:center;margin-top:14px;font-size:11px;color:#aaa}
.powered a{color:#8B5A9A;text-decoration:none;font-weight:600}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
</div>

<div class="modal-wrap" id="modalWrap" style="display:none">
  <div class="modal">
    <div class="modal-header" id="modalHeader">
      <!-- preenchido via JS -->
    </div>
    <div class="modal-body">
      <div id="formArea">
        <div class="field">
          <label>Nome completo <span class="req">*</span></label>
          <input type="text" id="f_nome" placeholder="João Silva" autocomplete="name"/>
        </div>
        <div class="field">
          <label>Celular / WhatsApp <span class="req">*</span></label>
          <input type="tel" id="f_tel" placeholder="(61) 99999-0000" autocomplete="tel"/>
        </div>
        <div class="field">
          <label>E-mail <span class="req">*</span></label>
          <input type="email" id="f_email" placeholder="joao@email.com" autocomplete="email"/>
        </div>
        <div id="extraFields"></div>
        <div class="err-msg" id="errMsg">⚠️ Preencha nome, celular e e-mail para continuar.</div>
        <button class="btn-wa" id="btnEnviar">
          <svg viewBox="0 0 24 24"><path d="M20.52 3.48A11.94 11.94 0 0 0 12 0C5.37 0 0 5.37 0 12c0 2.11.55 4.16 1.6 5.97L0 24l6.18-1.62A11.94 11.94 0 0 0 12 24c6.63 0 12-5.37 12-12 0-3.2-1.25-6.22-3.48-8.52zM12 22c-1.85 0-3.65-.5-5.22-1.44l-.37-.22-3.67.96.98-3.57-.24-.38A9.94 9.94 0 0 1 2 12C2 6.48 6.48 2 12 2c2.67 0 5.18 1.04 7.07 2.93A9.94 9.94 0 0 1 22 12c0 5.52-4.48 10-10 10zm5.47-7.4c-.3-.15-1.77-.87-2.04-.97-.28-.1-.48-.15-.68.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.65.07-.3-.15-1.26-.46-2.4-1.48-.89-.79-1.49-1.77-1.66-2.07-.17-.3-.02-.46.13-.61.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.68-1.63-.93-2.23-.24-.58-.49-.5-.68-.51H7.5c-.2 0-.5.07-.77.37C6.47 8.6 5.75 9.27 5.75 10.67c0 1.4 1.02 2.76 1.17 2.95.15.2 2 3.04 4.86 4.27.68.29 1.21.47 1.62.6.68.21 1.3.18 1.79.11.55-.08 1.77-.72 2.02-1.42.25-.7.25-1.3.17-1.42-.07-.12-.27-.2-.57-.34z"/></svg>
          Iniciar conversa no WhatsApp
        </button>
        <div class="lgpd">Seus dados são usados apenas para entrar em contato. Não enviamos spam.</div>
      </div>
      <div class="success" id="successArea">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="12" fill="#E6F4ED"/><path d="M7 12.5l3.5 3.5 6.5-7" stroke="#1A7A44" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        <h3>Tudo certo! 🎉</h3>
        <p>Abrindo o WhatsApp agora…</p>
      </div>
    </div>
  </div>
  <div class="powered">Powered by <a href="https://bgomarketingmedico.com.br" target="_blank">B.GO Marketing Médico</a></div>
</div>

<script>
// ── Lê configuração da URL ──────────────────────────────────
var P = new URLSearchParams(window.location.search);
var CFG = {
  wa:       P.get('wa')      || '',
  webhook:  P.get('wh')      || '',
  cor:      P.get('cor')     || '#25D366',
  titulo:   P.get('titulo')  || 'Fale com a gente',
  sub:      P.get('sub')     || 'Preencha para iniciarmos a conversa.',
  msg:      P.get('msg')     || 'Olá! Meu nome é {{nome}} e gostaria de agendar uma consulta.',
  esp:      P.get('esp')     === 'true',
  conv:     P.get('conv')    === 'true',
  nome:     P.get('nome')    || ''   // nome do cliente/clínica para fechar a página depois
};

// ── Monta o header com cor dinâmica ────────────────────────
var WICO = '<svg viewBox="0 0 24 24"><path d="M20.52 3.48A11.94 11.94 0 0 0 12 0C5.37 0 0 5.37 0 12c0 2.11.55 4.16 1.6 5.97L0 24l6.18-1.62A11.94 11.94 0 0 0 12 24c6.63 0 12-5.37 12-12 0-3.2-1.25-6.22-3.48-8.52zM12 22c-1.85 0-3.65-.5-5.22-1.44l-.37-.22-3.67.96.98-3.57-.24-.38A9.94 9.94 0 0 1 2 12C2 6.48 6.48 2 12 2c2.67 0 5.18 1.04 7.07 2.93A9.94 9.94 0 0 1 22 12c0 5.52-4.48 10-10 10zm5.47-7.4c-.3-.15-1.77-.87-2.04-.97-.28-.1-.48-.15-.68.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.65.07-.3-.15-1.26-.46-2.4-1.48-.89-.79-1.49-1.77-1.66-2.07-.17-.3-.02-.46.13-.61.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.68-1.63-.93-2.23-.24-.58-.49-.5-.68-.51H7.5c-.2 0-.5.07-.77.37C6.47 8.6 5.75 9.27 5.75 10.67c0 1.4 1.02 2.76 1.17 2.95.15.2 2 3.04 4.86 4.27.68.29 1.21.47 1.62.6.68.21 1.3.18 1.79.11.55-.08 1.77-.72 2.02-1.42.25-.7.25-1.3.17-1.42-.07-.12-.27-.2-.57-.34z"/></svg>';

document.getElementById('modalHeader').style.background = CFG.cor;
document.getElementById('modalHeader').innerHTML =
  WICO +
  '<div><h2>' + CFG.titulo + '</h2><p>' + CFG.sub + '</p></div>' +
  '<button class="close-btn" onclick="history.back()">✕</button>';

document.getElementById('btnEnviar').style.background = CFG.cor;

// ── Campos extras ───────────────────────────────────────────
var extra = '';
if (CFG.esp)  extra += '<div class="field"><label>Especialidade / Tratamento</label><input type="text" id="f_esp" placeholder="Ex: Varizes, Escleroterapia…"></div>';
if (CFG.conv) extra += '<div class="field"><label>Particular ou Convênio?</label><select id="f_conv"><option value="">Selecione…</option><option>Particular</option><option>Convênio</option><option>Não sei ainda</option></select></div>';
document.getElementById('extraFields').innerHTML = extra;

// ── Mostra modal após carregar ──────────────────────────────
setTimeout(function(){
  document.getElementById('loadingScreen').classList.add('hide');
  document.getElementById('modalWrap').style.display = 'block';
}, 300);

// ── UTMs ────────────────────────────────────────────────────
function utms(){
  return {
    utm_source:   P.get('utm_source')   || 'direto',
    utm_medium:   P.get('utm_medium')   || '',
    utm_campaign: P.get('utm_campaign') || '',
    utm_content:  P.get('utm_content')  || '',
    utm_term:     P.get('utm_term')     || '',
    pagina:       document.referrer || window.location.href,
    dispositivo:  /Mobi|Android/i.test(navigator.userAgent) ? 'Mobile' : 'Desktop'
  };
}

// ── Envio ────────────────────────────────────────────────────
document.getElementById('btnEnviar').addEventListener('click', function(){
  var nome  = document.getElementById('f_nome').value.trim();
  var tel   = document.getElementById('f_tel').value.trim();
  var email = document.getElementById('f_email').value.trim();
  var espEl = document.getElementById('f_esp');
  var convEl= document.getElementById('f_conv');

  if (!nome || !tel || !email || !/\S+@\S+\.\S+/.test(email)) {
    document.getElementById('errMsg').style.display = 'block';
    return;
  }
  document.getElementById('errMsg').style.display = 'none';

  var btn = document.getElementById('btnEnviar');
  btn.disabled = true; btn.textContent = 'Enviando…';

  var payload = Object.assign({
    data:          new Date().toLocaleDateString('pt-BR'),
    hora:          new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
    nome:          nome,
    telefone:      tel,
    email:         email,
    especialidade: espEl  ? espEl.value  : '',
    convenio:      convEl ? convEl.value : ''
  }, utms());

  if (CFG.webhook) {
    fetch(CFG.webhook, {
      method: 'POST', mode: 'no-cors',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    }).catch(function(){});
  }

  setTimeout(function(){
    document.getElementById('formArea').style.display = 'none';
    document.getElementById('successArea').style.display = 'block';
    var msgF = CFG.msg.replace('{{nome}}', nome);
    var waUrl = 'https://wa.me/' + CFG.wa + '?text=' + encodeURIComponent(msgF);
    setTimeout(function(){ window.location.href = waUrl; }, 900);
  }, 700);
});
</script>
</body>
</html>
